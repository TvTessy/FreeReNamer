<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI API 测试工具 - FreeReNamer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 40px 20px; }
    .container { max-width: 700px; margin: 0 auto; }
    h1 { font-size: 24px; margin-bottom: 24px; text-align: center; }
    .card { background: #1e293b; border-radius: 12px; padding: 24px; margin-bottom: 20px; border: 1px solid #334155; }
    label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; font-weight: 500; }
    select, input, textarea { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #e2e8f0; font-size: 14px; font-family: inherit; margin-bottom: 14px; }
    textarea { resize: vertical; min-height: 80px; }
    select:focus, input:focus, textarea:focus { outline: none; border-color: #6366f1; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .row.three { grid-template-columns: 1fr 1fr 80px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 10px 24px; border-radius: 8px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
    .btn-primary { background: #6366f1; color: #fff; width: 100%; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-outline { background: transparent; border: 1px solid #475569; color: #94a3b8; }
    .btn-outline:hover { border-color: #6366f1; color: #e2e8f0; }
    .response-box { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 16px; min-height: 120px; white-space: pre-wrap; word-break: break-all; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; max-height: 300px; overflow-y: auto; }
    .error { color: #f87171; }
    .success { color: #4ade80; }
    .presets { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .preset-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid #475569; background: #1e293b; color: #94a3b8; font-size: 12px; cursor: pointer; transition: all 0.15s; }
    .preset-btn:hover, .preset-btn.active { border-color: #6366f1; color: #e2e8f0; background: #312e81; }
    .tip { font-size: 12px; color: #64748b; margin-top: 8px; }
    .status { font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 AI API 测试工具</h1>

    <!-- API 配置 -->
    <div class="card">
      <h3 style="margin-bottom:16px;">API 配置</h3>
      <div class="presets" id="presets">
        <button class="preset-btn active" data-type="deepseek">DeepSeek</button>
        <button class="preset-btn" data-type="openai">OpenAI</button>
        <button class="preset-btn" data-type="groq">Groq</button>
        <button class="preset-btn" data-type="claude">Claude</button>
        <button class="preset-btn" data-type="openai-compatible">自定义</button>
      </div>
      <div class="row">
        <div><label>Base URL</label><input id="baseUrl" value="https://api.deepseek.com/v1" placeholder="https://api.deepseek.com/v1"></div>
        <div><label>Model</label><input id="model" value="deepseek-chat" placeholder="deepseek-chat"></div>
      </div>
      <label>API Key</label>
      <input id="apiKey" type="password" placeholder="sk-...">
    </div>

    <!-- 测试请求 -->
    <div class="card">
      <h3 style="margin-bottom:16px;">发送测试请求</h3>
      <label>System Prompt（可选）</label>
      <textarea id="systemPrompt" placeholder="你是一个有用的助手">你是一个文件重命名专家。用户会描述重命名需求，你需要生成对应的 JavaScript 代码。</textarea>
      <label>User Prompt</label>
      <textarea id="userPrompt" placeholder="描述你的需求...">将文件名全部改为小写，并将空格替换为下划线。代码放在名为 code 的函数中，参数 args 包含 { name, ext, index }。</textarea>
      <button class="btn btn-primary" id="sendBtn">发送请求</button>
      <div class="status" id="status"></div>
    </div>

    <!-- 返回结果 -->
    <div class="card">
      <h3 style="margin-bottom:16px;">返回结果</h3>
      <div class="response-box" id="response">等待发送请求...</div>
    </div>

    <p class="tip" style="text-align:center;">
      提示：如果 CORS 报错导致请求失败，用命令 <code>python3 -m http.server 8888</code> 启动本地服务器，然后访问 <code>http://localhost:8888/test-ai-api.html</code>
    </p>
  </div>

  <script>
    const PRESETS = {
      deepseek:  { baseUrl: 'https://api.deepseek.com/v1', model: 'deepseek-chat' },
      openai:    { baseUrl: 'https://api.openai.com/v1', model: 'gpt-4o-mini' },
      groq:      { baseUrl: 'https://api.groq.com/openai/v1', model: 'mixtral-8x7b-32768' },
      claude:    { baseUrl: 'https://api.anthropic.com/v1', model: 'claude-3-5-sonnet-20241022' },
      'openai-compatible': { baseUrl: 'http://localhost:8000/v1', model: 'your-model-name' },
    };

    const baseUrlEl = document.getElementById('baseUrl');
    const modelEl = document.getElementById('model');
    const apiKeyEl = document.getElementById('apiKey');
    const systemPromptEl = document.getElementById('systemPrompt');
    const userPromptEl = document.getElementById('userPrompt');
    const sendBtn = document.getElementById('sendBtn');
    const responseEl = document.getElementById('response');
    const statusEl = document.getElementById('status');

    // 预设切换
    document.getElementById('presets').addEventListener('click', (e) => {
      if (e.target.classList.contains('preset-btn')) {
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        const type = e.target.dataset.type;
        const preset = PRESETS[type];
        baseUrlEl.value = preset.baseUrl;
        modelEl.value = preset.model;
      }
    });

    // 发送请求
    sendBtn.addEventListener('click', async () => {
      const baseUrl = baseUrlEl.value.trim().replace(/\/+$/, '');
      const model = modelEl.value.trim();
      const apiKey = apiKeyEl.value.trim();
      const url = baseUrl + '/chat/completions';

      const messages = [];
      if (systemPromptEl.value.trim()) {
        messages.push({ role: 'system', content: systemPromptEl.value.trim() });
      }
      messages.push({ role: 'user', content: userPromptEl.value.trim() });

      const headers = { 'Content-Type': 'application/json' };
      if (apiKey) headers['Authorization'] = 'Bearer ' + apiKey;

      sendBtn.disabled = true;
      sendBtn.textContent = '请求中...';
      statusEl.textContent = '';
      responseEl.textContent = '加载中...';
      responseEl.className = 'response-box';

      try {
        const res = await fetch(url, {
          method: 'POST',
          headers,
          body: JSON.stringify({ model, messages }),
        });

        const text = await res.text();

        if (!res.ok) {
          responseEl.textContent = 'HTTP ' + res.status + '\n\n' + text;
          responseEl.className = 'response-box error';
          statusEl.innerHTML = '<span style="color:#f87171;">请求失败</span>';
        } else {
          const data = JSON.parse(text);
          const content = data.choices?.[0]?.message?.content ?? text;
          responseEl.textContent = typeof content === 'string' ? content : JSON.stringify(content, null, 2);
          responseEl.className = 'response-box success';
          statusEl.innerHTML = '<span style="color:#4ade80;">请求成功 ✓ 模型: ' + (data.model || model) + '</span>';
        }
      } catch (err) {
        responseEl.textContent = '网络错误: ' + err.message;
        responseEl.className = 'response-box error';
        statusEl.innerHTML = '<span style="color:#f87171;">网络错误</span>';
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = '发送请求';
      }
    });
  </script>
</body>
</html>
